<svg width="744" height="1039" viewBox="0 0 744 1039" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1a1f"></stop>
      <stop offset="100%" stop-color="#020608"></stop>
    </linearGradient>

    <!-- Red accent -->
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff3b3b"></stop>
      <stop offset="100%" stop-color="#7a0000"></stop>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="744" height="1039" rx="40" fill="url(#bg)"></rect>

  <!-- Frame -->
  <rect x="20" y="20" width="704" height="999" rx="30" fill="none" stroke="#1f3a40" stroke-width="10"></rect>

  <!-- Pattern Faces (hidden hunters) -->
  <g opacity="0.15" fill="#9bbcc2">
    <circle cx="150" cy="200" r="40"></circle>
    <circle cx="600" cy="250" r="50"></circle>
    <circle cx="200" cy="700" r="45"></circle>
    <circle cx="550" cy="750" r="40"></circle>
  </g>

  <!-- Center Dracula Symbol -->
  <g transform="translate(372,520)">

    <!-- Cloak -->
    <path d="
      M -140 120
      L 0 -140
      L 140 120
      Q 0 60 -140 120
    " fill="#1a0000"></path>

    <!-- Face -->
    <polygon points="0,-120 40,-20 0,60 -40,-20" fill="#f2e6d0"></polygon>

    <!-- Collar -->
    <polygon points="-80,-40 0,-120 80,-40 0,-20" fill="url(#red)"></polygon>

    <!-- Eyes -->
    <circle cx="-12" cy="-40" r="4" fill="#ff3b3b"></circle>
    <circle cx="12" cy="-40" r="4" fill="#ff3b3b"></circle>

  </g>

  <!-- Crossed weapons -->
  <g stroke="#c9a25b" stroke-width="5" opacity="0.7">
    <line x1="200" y1="200" x2="544" y2="839"></line>
    <line x1="544" y1="200" x2="200" y2="839"></line>
  </g>

  <!-- Blood accents -->
  <g fill="#7a0000">
    <path d="M100 100 C110 140,90 180,100 220 C110 180,130 140,100 100"></path>
    <path d="M640 100 C650 140,630 180,640 220 C650 180,670 140,640 100"></path>
  </g>

</svg>